# Region map: Shinto Slimes
# Winding path from shrine entrance to the giga slime lair.
# The camera pans across the map as the player cycles through zones.
#
# Marker positions (row, col) are where the dynamic zone marker is composited.
# The base art has an 'o' at each anchor position — the renderer overwrites it
# with the appropriate state marker (?, o, *, X) at runtime.
#
# TERRAIN VOCABULARY (for authoring/extending):
#   ~        water / streams (rendered blue)
#   *  .     cherry blossoms / path dots (rendered dim pink / gray)
#   |  /  \  structures, bamboo stalks, walls (rendered dim gray)
#   _  -  =  floors, paths, bridges (rendered dim gray)
#   ( ) [ ]  structural brackets (rendered dim gray)
#   A-Z a-z  zone names and labels (rendered slightly brighter gray)
#   o        zone anchor placeholder — will be overwritten by marker renderer
#            (must be at the exact anchor coordinate)
#   <space>  empty / sky — no color applied
#
# AUTHORING TIPS:
#   - Use `heresiarch-map find <file> o` to list all 'o' positions
#   - Use `heresiarch-map inspect <file> <row> <col>` to view a region with rulers
#   - Use `heresiarch-map validate <file>` to check anchors against zone data
#   - Leave at least 1 empty row ABOVE each anchor for the selection flag (|>)
#   - Map should be wider+taller than a typical terminal for meaningful panning

