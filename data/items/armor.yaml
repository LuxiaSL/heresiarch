# --- Hybrid Armor (flat, no scaling — training wheels for glass cannons) ---

- id: warding_mail
  name: Warding Mail
  slot: ARMOR
  tier: 1
  description: "Blended protection. Strong early, outpaced by specialists."
  base_price: 80
  flat_stat_bonus:
    DEF: 30
    RES: 30

# --- DEF Armor Tier (Layer 3 scaling, natural job: Martyr @ 6 DEF/lv) ---
# Crossovers: Iron Guard -> Runic Plate @ Lv30, Runic Plate -> Void Bastion @ Lv60

- id: iron_guard
  name: Iron Guard
  slot: ARMOR
  tier: 1
  description: "Reliable. Holds the line."
  base_price: 120
  scaling:
    scaling_type: LINEAR
    stat: DEF
    base: 20.0
    linear_coeff: 1.0

- id: runic_plate
  name: Runic Plate
  slot: ARMOR
  tier: 2
  description: "Investment piece. Overtakes Iron Guard around Lv30."
  base_price: 5000
  scaling:
    scaling_type: SUPERLINEAR
    stat: DEF
    base: 15.0
    linear_coeff: 0.3
    quadratic_coeff: 0.004

- id: void_bastion
  name: Void Bastion
  slot: ARMOR
  tier: 3
  description: "Hurts you early. Unkillable late. Overtakes Runic Plate around Lv60."
  base_price: 9000
  scaling:
    scaling_type: DEGENERATE
    stat: DEF
    constant_offset: -184.0
    quadratic_coeff: 0.006369

# --- RES Armor Tier (Layer 3 scaling, natural job: Onmyoji @ 5 RES/lv) ---
# Crossover: Spirit Mantle -> Resonance Veil @ Lv30

- id: spirit_mantle
  name: Spirit Mantle
  slot: ARMOR
  tier: 1
  description: "Wards off secondary effects. Caster baseline."
  base_price: 120
  scaling:
    scaling_type: LINEAR
    stat: RES
    base: 20.0
    linear_coeff: 1.0

- id: resonance_veil
  name: Resonance Veil
  slot: ARMOR
  tier: 2
  description: "Deep RES commitment. Overtakes Spirit Mantle around Lv30."
  base_price: 5000
  scaling:
    scaling_type: QUADRATIC
    stat: RES
    base: 15.0
    quadratic_coeff: 0.0069
