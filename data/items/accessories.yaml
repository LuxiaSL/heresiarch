# ===================================================================
# Accessories: converters, utility, leech
# ===================================================================
#
# Converters: Read from post-weapon effective stat (L4), write to
# augmented base (L2) so weapon scaling amplifies the output.
# All tier 1 use sigmoid {max:25, mid:75, rate:0.03}.
# Tier 2/3 converters will come with later regions.

# ===================================================================
# Stat Converters — STR source
# ===================================================================

- id: str_to_mag_charm
  name: War Lens
  equip_type: ACCESSORY
  tier: 1
  description: "Cracked but humming. STR feeds MAG."
  base_price: 1000
  loot_category: converter
  conversion:
    source_stat: STR
    target_stat: MAG
    scaling_type: SIGMOID
    sigmoid_max: 25.0
    sigmoid_mid: 75.0
    sigmoid_rate: 0.03

