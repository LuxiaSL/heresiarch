# ===================================================================
# Consumables: potions, stat tonics, teach scrolls, cast scrolls
# ===================================================================
#
# Pricing: 10x per tier. Cast scrolls = 20-30% of teach price.
# Tier 1: basic/early abilities. Tier 2: strong/build-defining.
# Passives have teach scrolls only (no cast version).

# ===================================================================
# Healing Potions
# ===================================================================

- id: minor_potion
  name: Minor Potion
  tier: 1
  is_consumable: true
  loot_category: potion
  heal_amount: 50
  base_price: 30
  description: "Restores 50 HP. Tastes like shrine water."

- id: potion
  name: Potion
  tier: 1
  is_consumable: true
  loot_category: potion
  heal_amount: 150
  base_price: 90
  description: "Restores 150 HP. Standard issue."

- id: major_potion
  name: Major Potion
  tier: 2
  is_consumable: true
  loot_category: potion
  heal_amount: 400
  base_price: 240
  description: "Restores 400 HP. For when it matters."

- id: elixir
  name: Elixir
  tier: 3
  is_consumable: true
  loot_category: potion
  heal_percent: 1.0
  base_price: 2500
  description: "Restores full HP. Liquid regret prevention."

