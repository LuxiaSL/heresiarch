- id: retaliate
  name: Retaliate
  category: PASSIVE
  target: SINGLE_ENEMY
  trigger: ON_HIT_RECEIVED
  is_innate: true
  description: "When hit, counter-attacks for 5 + 0.5x STR damage, reduced by attacker's DEF."
  effects:
    - base_damage: 5
      stat_scaling: STR
      scaling_coefficient: 0.5

- id: frenzy
  name: Frenzy
  category: PASSIVE
  target: SELF
  trigger: ON_CONSECUTIVE_ATTACK
  is_innate: true
  description: "Each consecutive attack action in the same round deals +15% more damage (stacks multiplicatively)."
  effects:
    - surge_stack_bonus: 0.15

- id: insight
  name: Insight
  category: PASSIVE
  target: SELF
  trigger: ON_NON_DAMAGE_ACTION
  is_innate: true
  description: "Non-damage actions and Survive build stacks. Insight-amplified abilities consume 1 stack for +40% effectiveness."
  effects:
    - surge_stack_bonus: 0.40

- id: thorns
  name: Thorns
  category: PASSIVE
  target: SELF
  trigger: ON_HIT_RECEIVED
  is_innate: true
  description: "Reflects 70% of incoming pre-defense damage back to the attacker. Scales +20% per 10 levels."
  effects:
    - reflect_percent: 0.70

- id: mitosis
  name: Mitosis
  category: PASSIVE
  target: SELF
  is_innate: true
  description: "When this enemy takes lethal damage, it splits into two smaller slimes instead of dying."
  effects:
    - split_into_templates:
        - mini_slime
        - mini_slime

- id: giga_mitosis
  name: Giga Mitosis
  category: PASSIVE
  target: SELF
  is_innate: true
  description: "When this boss takes lethal damage, it splits into three archetypal mini-bosses instead of dying."
  effects:
    - split_into_templates:
        - slime_brute_miniboss
        - slime_caster_miniboss
        - slime_tank_miniboss
