# --- Passive abilities ---

- id: blood_rush
  name: Blood Rush
  category: PASSIVE
  target: SELF
  trigger: HP_BELOW_THRESHOLD
  trigger_threshold: 0.3
  is_innate: false
  description: "When HP drops below 30%, permanently gains +50 SPD for the rest of combat."
  effects:
    - stat_buff:
        SPD: 50

- id: vengeance
  name: Vengeance
  category: PASSIVE
  target: SELF
  trigger: ON_ALLY_KO
  is_innate: false
  description: "When an ally is killed, gains +50 STR and +50 MAG for 3 rounds."
  effects:
    - stat_buff:
        STR: 50
        MAG: 50
      duration_rounds: 3

- id: momentum
  name: Momentum
  category: PASSIVE
  target: SELF
  trigger: ON_KILL
  is_innate: false
  description: "On kill, refunds 1 AP, allowing an extra action this turn."
  effects:
    - ap_refund: 1

- id: counter_hex
  name: Counter Hex
  category: PASSIVE
  target: SINGLE_ENEMY
  trigger: RES_GATE_PASSED
  is_innate: false
  description: "When this character passes a RES gate check, reflects a 2-round Disrupt back onto the attacker."
  effects:
    - quality: DISRUPT
      duration_rounds: 2

- id: siphon
  name: Siphon
  category: PASSIVE
  target: SELF
  trigger: ON_HIT_RECEIVED
  is_innate: false
  description: "Each time this character is hit, gains a permanent +5 MAG stack (lasts for the fight)."
  effects:
    - stat_buff:
        MAG: 5

