# --- Defensive abilities ---

- id: taunt
  name: Taunt
  category: DEFENSIVE
  target: SELF
  cooldown: 3
  is_innate: false
  description: "Forces all enemies to target this character for 1 round."
  effects:
    - duration_rounds: 1
      applies_taunt: true

- id: stalwart
  name: Stalwart
  category: DEFENSIVE
  target: SELF
  cooldown: 3
  is_innate: false
  description: "Steel the body and mind. Buffs DEF and RES for 2 turns."
  effects:
    - stat_buff:
        DEF: 20
        RES: 20
      duration_rounds: 2
      applies_to_self: true

- id: damage_split
  name: Damage Split
  category: DEFENSIVE
  target: SINGLE_ALLY
  is_innate: false
  description: "Absorbs a percentage of ally damage and redirects it to self. DEF scaling reduces redirected damage taken."
  effects:
    - def_buff: 20
      stat_scaling: DEF
      scaling_coefficient: 0.3
      duration_rounds: 3

- id: brace_strike
  name: Brace Strike
  category: DEFENSIVE
  target: SINGLE_ENEMY
  is_innate: false
  description: "A disciplined attack that hardens the user's guard. Deals STR damage and grants a minor DEF buff for 1 turn."
  effects:
    - base_damage: 8
      stat_scaling: STR
      scaling_coefficient: 0.4
    - def_buff: 15
      duration_rounds: 1
      applies_to_self: true

- id: anchor
  name: Anchor
  category: DEFENSIVE
  target: SELF
  is_innate: false
  description: "Plants feet and steels resolve. Reduces effectiveness of Disrupt-quality effects for the duration."
  effects:
    - stat_scaling: DEF
      scaling_coefficient: 0.0
      duration_rounds: 3

- id: endure
  name: Endure
  category: PASSIVE
  target: SELF
  trigger: NONE
  is_innate: false
  description: "Brace for the worst. Survive one lethal hit at 1 HP, once per fight."
  effects:
    - survive_lethal: true

- id: ward
  name: Ward
  category: DEFENSIVE
  target: SINGLE_ALLY
  is_innate: false
  description: "Conjures a protective ward that bolsters RES for 3 rounds. Scales with RES."
  effects:
    - stat_buff:
        RES: 30
      stat_scaling: RES
      scaling_coefficient: 0.0
      duration_rounds: 3
