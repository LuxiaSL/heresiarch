# --- Core actions ---

- id: survive
  name: Survive
  category: DEFENSIVE
  target: SELF
  priority: true
  description: "Halves all incoming damage this round and gains 1 AP. Priority action (resolves first)."
  effects:
    - ap_gain: 1
      grants_surviving: true

# --- Defensive abilities ---

- id: taunt
  name: Taunt
  category: DEFENSIVE
  target: SINGLE_ENEMY
  cooldown: 3
  is_innate: false
  insight_amplified: false
  description: "Forces target to attack this character next round. 3-turn cooldown."
  effects:
    - duration_rounds: 1
      applies_taunt: true

- id: stalwart
  name: Stalwart
  category: DEFENSIVE
  target: SELF
  cooldown: 3
  is_innate: false
  insight_amplified: true
  description: "Grants +20 DEF and +20 RES for 2 rounds. 3-turn cooldown."
  effects:
    - stat_buff:
        DEF: 20
        RES: 20
      duration_rounds: 2
      applies_to_self: true

- id: damage_split
  name: Damage Split
  category: DEFENSIVE
  target: SINGLE_ALLY
  is_innate: false
  insight_amplified: true
  description: "Redirects a portion of damage from an ally to self for 3 rounds. Grants +20 DEF to absorb the redirected hits."
  effects:
    - def_buff: 20
      stat_scaling: DEF
      scaling_coefficient: 0.3
      duration_rounds: 3

- id: brace_strike
  name: Brace Strike
  category: DEFENSIVE
  target: SINGLE_ENEMY
  is_innate: false
  insight_amplified: true
  description: "Deals 8 + 0.4x STR damage and grants +15 DEF to self for 1 round."
  effects:
    - base_damage: 8
      stat_scaling: STR
      scaling_coefficient: 0.4
    - def_buff: 15
      duration_rounds: 1
      applies_to_self: true

- id: anchor
  name: Anchor
  category: DEFENSIVE
  target: SELF
  is_innate: false
  insight_amplified: true
  description: "Reduces effectiveness of Disrupt-quality effects on self for 3 rounds."
  effects:
    - stat_scaling: DEF
      scaling_coefficient: 0.0
      duration_rounds: 3

- id: endure
  name: Endure
  category: PASSIVE
  target: SELF
  trigger: NONE
  is_innate: false
  description: "Survive one lethal hit at 1 HP, once per combat."
  effects:
    - survive_lethal: true

- id: shell_retreat
  name: Shell Retreat
  category: DEFENSIVE
  target: SELF
  cooldown: 3
  is_innate: false
  description: "Becomes immune to all damage for 1 turn. 3-turn cooldown."
  effects:
    - grants_invulnerable: 1

- id: ward
  name: Ward
  category: DEFENSIVE
  target: SINGLE_ALLY
  is_innate: false
  insight_amplified: true
  description: "Grants +30 RES to an ally for 3 rounds."
  effects:
    - stat_buff:
        RES: 30
      stat_scaling: RES
      scaling_coefficient: 0.0
      duration_rounds: 3
