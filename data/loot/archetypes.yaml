# ===================================================================
# Loot Tables — Pool-Based Format
# ===================================================================
#
# Design rules:
#   - ALL regular enemies: 10% tonic (category-based, uniform random)
#   - Zone 3+ enemies: additional 15% minor_potion chance
#   - NO weapon/armor/accessory drops from regular mobs
#   - Exception: swime has 5% iron_blade
#   - Summoned/split enemies (kodama, split_slime): no drops
#   - Alpha Slime: guaranteed potion + equipment (50/50 weapon/armor T1) + scroll set
#   - Bosses Z2-3: guaranteed potion + scroll set + utility accessory
#   - Bosses Z4-6: guaranteed potion + scroll set + converter
#   - Giga Slime: splits into fragments; only brute fragment drops items

# ===================================================================
# Zone 1 — Tutorial Enemies
# ===================================================================

- enemy_template_id: fodder_slime
  guaranteed_money: true
  pools:
    # 10% tonic
    - chance: 0.10
      count: 1
      items:
        - category: tonic

# Zone 1 Boss: Alpha Slime
- enemy_template_id: alpha_slime
  guaranteed_money: true
  money_multiplier: 3.5
  pools:
    # Guaranteed potion
    - chance: 1.0
      count: 1
      items:
        - category: potion
          tier: 1
    # Guaranteed equipment: 50% weapon, 50% armor (tier 1)
    - chance: 1.0
      branches:
        - weight: 1
          count: 1
          items:
            - category: weapon
              tier: 1
        - weight: 1
          count: 1
          items:
            - category: armor
              tier: 1
    # Scroll set: 66% → 2x cast scroll, 33% → 1x teach scroll
    - chance: 1.0
      branches:
        - weight: 2
          count: 2
          items:
            - category: cast_scroll
              tier: 1
        - weight: 1
          count: 1
          items:
            - category: teach_scroll
              tier: 1
    # Weak converter chance (tutorial boss)
    - chance: 0.15
      count: 1
      items:
        - category: converter

