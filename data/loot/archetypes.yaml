# Loot drop tables per enemy archetype
# Accessories come ONLY from drops, never shops
# Equipment drops = items the enemy is carrying (matching their class)

- enemy_template_id: fodder_slime
  guaranteed_money: true
  common_item_ids:
    - minor_potion
  common_drop_chance: 0.1
  rare_item_ids: []
  rare_drop_chance: 0.0
  equipment_drop_chance: 0.0

- enemy_template_id: alpha_slime
  guaranteed_money: true
  money_multiplier: 3.5
  common_item_ids: []
  common_drop_chance: 0.0
  rare_item_ids: []
  rare_drop_chance: 0.0
  equipment_drop_chance: 0.0
  guaranteed_pools:
    # Always drop a potion
    - items:
        - { item_id: minor_potion, weight: 3 }
        - { item_id: potion, weight: 1 }
    # Always drop a gear piece
    - items:
        - { item_id: endurance_plate, weight: 2 }
        - { item_id: gale_brace, weight: 2 }
        - { item_id: iron_blade, weight: 3 }
        - { item_id: scroll_searing_edge, weight: 1 }

