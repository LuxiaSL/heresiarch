# --- Bandit: fast, squishy, steals gold. Kill it first. ---
- id: bandit_slime
  name: Bandit Slime
  archetype: FODDER
  budget_multiplier: 7.0
  stat_distribution:
    STR: 0.20
    MAG: 0.05
    DEF: 0.10
    RES: 0.05
    SPD: 0.60
  base_hp: 15
  hp_per_budget: 1.0
  abilities:
    - pilfer
    - basic_attack
  equipment: []
  target_preference: random
  description: "Gleaming eyes, sticky fingers. Hits your wallet harder than your HP."
  action_table:
    base_weights:
      - ability_id: pilfer
        weight: 0.80
      - ability_id: basic_attack
        weight: 0.20
    conditions:
      - condition_type: self_hp_below
        threshold: 0.30
        weight_overrides:
          - ability_id: pilfer
            weight: 0.40
          - ability_id: basic_attack
            weight: 0.60

# --- Brute: STR weapon + DEF armor ---
- id: brute_oni
  name: Brute Oni
  archetype: BRUTE
  budget_multiplier: 14.0
  stat_distribution:
    STR: 0.33
    MAG: 0.05
    DEF: 0.29
    RES: 0.05
    SPD: 0.07
  base_hp: 40
  hp_per_budget: 3.0
  abilities:
    - heavy_strike
    - arc_slash
    - basic_attack
  equipment:
    - iron_blade
    - iron_guard
  description: "Slow heavy hitter. Punishes post-Cheat vulnerability."
  action_table:
    base_weights:
      - ability_id: heavy_strike
        weight: 0.80
      - ability_id: arc_slash
        weight: 0.15
      - ability_id: basic_attack
        weight: 0.05
    conditions:
      - condition_type: player_hp_below
        threshold: 0.30
        weight_overrides:
          - ability_id: heavy_strike
            weight: 0.95
          - ability_id: arc_slash
            weight: 0.05
          - ability_id: basic_attack
            weight: 0.0
      - condition_type: self_hp_below
        threshold: 0.25
        weight_overrides:
          - ability_id: heavy_strike
            weight: 0.40
          - ability_id: arc_slash
            weight: 0.10
          - ability_id: basic_attack
            weight: 0.50
      - condition_type: player_post_cheat
        weight_overrides:
          - ability_id: heavy_strike
            weight: 0.95
          - ability_id: arc_slash
            weight: 0.05
          - ability_id: basic_attack
            weight: 0.0

