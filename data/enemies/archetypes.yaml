# --- Support: MAG weapon + RES armor ---
- id: support_tanuki
  name: Support Tanuki
  archetype: SUPPORT
  budget_multiplier: 10.0
  stat_distribution:
    STR: 0.10
    MAG: 0.30
    DEF: 0.20
    RES: 0.25
    SPD: 0.15
  base_hp: 30
  hp_per_budget: 2.5
  abilities:
    - heal_ally
    - rally
    - bolt
    - basic_attack
  equipment:
    - spirit_lens
    - spirit_mantle
  description: "Heals and buffs allies. Kill it first or the fight never ends."
  action_table:
    base_weights:
      - ability_id: heal_ally
        weight: 0.35
      - ability_id: rally
        weight: 0.25
      - ability_id: bolt
        weight: 0.25
      - ability_id: basic_attack
        weight: 0.15
    conditions:
      - condition_type: ally_hp_below
        threshold: 0.40
        weight_overrides:
          - ability_id: heal_ally
            weight: 0.70
          - ability_id: rally
            weight: 0.05
          - ability_id: bolt
            weight: 0.15
          - ability_id: basic_attack
            weight: 0.10
      - condition_type: no_damaged_allies
        weight_overrides:
          - ability_id: heal_ally
            weight: 0.0
          - ability_id: rally
            weight: 0.40
          - ability_id: bolt
            weight: 0.40
          - ability_id: basic_attack
            weight: 0.20
      - condition_type: last_standing
        weight_overrides:
          - ability_id: heal_ally
            weight: 0.0
          - ability_id: rally
            weight: 0.0
          - ability_id: bolt
            weight: 0.60
          - ability_id: basic_attack
            weight: 0.40
