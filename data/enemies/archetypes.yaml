# --- Zone 1 boss: beefed-up slime with a weapon ---
- id: alpha_slime
  name: Alpha Slime
  archetype: FODDER
  budget_multiplier: 12.0
  stat_distribution:
    STR: 0.35
    MAG: 0.05
    DEF: 0.25
    RES: 0.05
    SPD: 0.30
  base_hp: 30
  hp_per_budget: 2.5
  abilities:
    - basic_attack
    - heavy_strike
  equipment:
    - iron_blade
  description: "Bigger, meaner slime. Has somehow absorbed a weapon."
  action_table:
    base_weights:
      - ability_id: basic_attack
        weight: 0.40
      - ability_id: heavy_strike
        weight: 0.60

