# --- Zone 5 Boss: Tanuki Trickster ---
# Mimics player's last action type. Punishes patterns, rewards variety.
- id: tanuki_boss
  name: Tanuki Trickster
  archetype: BOSS
  budget_multiplier: 15.0
  xp_multiplier: 4.0
  stat_distribution:
    STR: 0.25
    MAG: 0.25
    DEF: 0.20
    RES: 0.10
    SPD: 0.20
  base_hp: 50
  hp_per_budget: 3.0
  abilities:
    - heavy_strike
    - bolt
    - heal_ally
    - basic_attack
    - regen
  equipment:
    - iron_blade
    - spirit_lens
  description: "Shapeshifting trickster. Mirrors your strategy back at you."
  action_table:
    base_weights:
      - ability_id: heavy_strike
        weight: 0.30
      - ability_id: bolt
        weight: 0.30
      - ability_id: heal_ally
        weight: 0.15
      - ability_id: basic_attack
        weight: 0.25
    conditions:
      # Player attacked physically → Tanuki hits back harder
      - condition_type: player_last_used_physical
        weight_overrides:
          - ability_id: heavy_strike
            weight: 0.65
          - ability_id: bolt
            weight: 0.10
          - ability_id: heal_ally
            weight: 0.10
          - ability_id: basic_attack
            weight: 0.15
      # Player used non-damage action → Tanuki uses magic
      - condition_type: player_last_used_magical
        weight_overrides:
          - ability_id: bolt
            weight: 0.65
          - ability_id: heavy_strike
            weight: 0.10
          - ability_id: heal_ally
            weight: 0.10
          - ability_id: basic_attack
            weight: 0.15
      # Player Survived → Tanuki wastes turn healing (advantage to player)
      - condition_type: player_last_used_survive
        weight_overrides:
          - ability_id: heal_ally
            weight: 0.70
          - ability_id: basic_attack
            weight: 0.15
          - ability_id: heavy_strike
            weight: 0.10
          - ability_id: bolt
            weight: 0.05

