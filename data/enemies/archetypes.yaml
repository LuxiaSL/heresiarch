- id: brute_oni
  name: Brute Oni
  archetype: BRUTE
  budget_multiplier: 14.0
  stat_distribution:
    STR: 0.33
    MAG: 0.05
    DEF: 0.29
    RES: 0.05
    SPD: 0.07
  base_hp: 40
  hp_per_budget: 3.0
  abilities:
    - heavy_strike
    - arc_slash
    - basic_attack
  description: "Slow heavy hitter. Punishes post-Cheat vulnerability."
  action_table:
    base_weights:
      - ability_id: heavy_strike
        weight: 0.80
      - ability_id: arc_slash
        weight: 0.15
      - ability_id: basic_attack
        weight: 0.05
    conditions:
      - condition_type: player_hp_below
        threshold: 0.30
        weight_overrides:
          - ability_id: heavy_strike
            weight: 0.95
          - ability_id: arc_slash
            weight: 0.05
          - ability_id: basic_attack
            weight: 0.0
      - condition_type: self_hp_below
        threshold: 0.25
        weight_overrides:
          - ability_id: heavy_strike
            weight: 0.40
          - ability_id: arc_slash
            weight: 0.10
          - ability_id: basic_attack
            weight: 0.50
      - condition_type: player_post_cheat
        weight_overrides:
          - ability_id: heavy_strike
            weight: 0.95
          - ability_id: arc_slash
            weight: 0.05
          - ability_id: basic_attack
            weight: 0.0

