# Slime Curriculum: Shinto early game (zones 1-15)
# Teaches basic combat, AOE value, archetype differences, boss mechanics
#
# Shop philosophy:
#   - Weapons/armor only (LINEAR early, SUPERLINEAR/QUADRATIC zone 8+)
#   - Accessories are loot drops, not buyable
#   - Potions scale with zone difficulty
#
# Unlock chain: linear (zone_01 always available, each requires prior cleared)

- id: zone_01
  name: Shrine Entrance
  zone_level: 1
  region: shinto_slimes
  xp_cap_level: 5
  loot_tier: 1
  unlock_requires: []
  shop_item_pool:
    - iron_blade
    - spirit_lens
    - iron_guard
    - spirit_mantle
    - warding_mail
    - minor_potion
  encounters:
    - enemy_templates: [fodder_slime]
      enemy_counts: [1]
    - enemy_templates: [fodder_slime]
      enemy_counts: [2]
    - enemy_templates: [fodder_slime]
      enemy_counts: [2]
    - enemy_templates: [fodder_slime]
      enemy_counts: [3]
    - enemy_templates: [alpha_slime]
      enemy_counts: [1]
      is_boss: true

